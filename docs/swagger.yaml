basePath: /api/v1
definitions:
  handler.artifactResponse:
    properties:
      completedAt:
        type: string
      datacenterId:
        type: string
      datacenterName:
        type: string
      digest:
        type: string
      error:
        type: string
      exportJobId:
        type: string
      id:
        type: integer
      initiatedAt:
        type: string
      registry:
        type: string
      repository:
        type: string
      signed:
        type: boolean
      signingKeyFingerprint:
        type: string
      sizeBytes:
        type: integer
      status:
        type: string
      tag:
        type: string
    type: object
  handler.backupResponse:
    properties:
      checksum:
        type: string
      completedAt:
        type: string
      error:
        type: string
      id:
        type: string
      initiatedAt:
        type: string
      initiatedBy:
        type: string
      s3Key:
        type: string
      sizeBytes:
        type: integer
      status:
        type: string
    type: object
  handler.publishResponse:
    properties:
      artifactId:
        type: integer
      repository:
        type: string
      status:
        type: string
      tag:
        type: string
    type: object
  handler.restoreJobResponse:
    properties:
      backupId:
        type: string
      backupKey:
        type: string
      completedAt:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      error:
        type: string
      id:
        type: string
      log:
        type: string
      startedAt:
        type: string
      status:
        type: string
    type: object
  handler.statusResponse:
    properties:
      completedAt:
        type: string
      createdAt:
        type: string
      dataCenter:
        type: string
      error:
        type: string
      jobId:
        type: string
      published:
        type: boolean
      startedAt:
        type: string
      status:
        type: string
    type: object
  handler.triggerResponse:
    properties:
      jobId:
        type: string
      status:
        type: string
    type: object
  orb.ImportRecord:
    properties:
      dcOrbId:
        type: string
      digest:
        type: string
      error:
        type: string
      exportJobId:
        type: string
      importedAt:
        type: string
      status:
        description: '"done" | "failed"'
        type: string
      tag:
        type: string
    type: object
  orb.Override:
    properties:
      field:
        type: string
      intentValue:
        type: string
      localValue:
        type: string
      overriddenAt:
        type: string
      overriddenBy:
        type: string
      resourceId:
        description: DGraph ID
        type: string
      resourceOrbId:
        type: string
      resourceType:
        type: string
    type: object
  orbserver.importSnapshot:
    properties:
      availableVersion:
        type: string
      currentVersion:
        type: string
      lastChecked:
        type: string
      lastError:
        type: string
      lastImport:
        $ref: '#/definitions/orb.ImportRecord'
      status:
        type: string
    type: object
  orbserver.overrideRequest:
    properties:
      field:
        type: string
      localValue:
        type: string
      resourceId:
        type: string
      resourceOrbId:
        type: string
      resourceType:
        type: string
    type: object
info:
  contact: {}
  description: API-first, graph-native source of truth for modular data centers.
  title: Orbital API
  version: 0.1.0
paths:
  /api/v1/backups:
    get:
      description: Returns up to 50 backup records ordered by most recent first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.backupResponse'
            type: array
      summary: List backups
      tags:
      - backup graph
    post:
      description: Triggers an async DGraph backup to configured S3-compatible or
        Azure Blob storage. Returns immediately with a job ID. Returns 409 if a backup
        is already in progress.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.triggerResponse'
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger backup
      tags:
      - backup graph
  /api/v1/backups/{id}:
    delete:
      description: Deletes the backup record and its archive from storage. Returns
        409 if the backup is still running.
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete backup
      tags:
      - backup graph
    get:
      description: Returns the current status and metadata for a single backup job.
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.backupResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get backup status
      tags:
      - backup graph
  /api/v1/backups/{id}/download:
    get:
      description: Returns a presigned URL (valid 15 minutes) to download the completed
        backup archive. Returns 404 if the job is not completed or has no archive.
      parameters:
      - description: Backup job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Download backup
      tags:
      - backup graph
  /api/v1/datacenters/{id}/export:
    post:
      description: Triggers an async export of the data center's configuration subgraph.
        Returns immediately with a job ID. Returns 409 if an export is already in
        progress for this data center.
      parameters:
      - description: Data center ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.triggerResponse'
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger subgraph export
      tags:
      - export subgraph
  /api/v1/events:
    get:
      description: Returns recorded mutation events. Supports limit/offset pagination
        and optional filtering by orbId, resource_type, resource_id, or operation_name.
        Returns JSON by default; returns an HTML table fragment when the HX-Request
        header is present.
      parameters:
      - description: Max results (default 100, max 500)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Filter by resource orbId (e.g. alaska-dot:GRTLY24)
        in: query
        name: orbId
        type: string
      - description: Filter by resource type (e.g. DataCenter, Server)
        in: query
        name: resource_type
        type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        type: string
      - description: Filter by operation name (e.g. UpdateServer)
        in: query
        name: operation_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List audit events
      tags:
      - events
  /api/v1/export/jobs:
    get:
      description: Returns the 50 most recent export jobs ordered by creation time.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.statusResponse'
            type: array
      summary: List export jobs
      tags:
      - export subgraph
  /api/v1/export/jobs/{jobId}:
    delete:
      description: Deletes an export job record and removes its local scratch file.
        Does not remove any published OCI artifacts from the registry.
      parameters:
      - description: Export job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete export job
      tags:
      - export subgraph
    get:
      description: Returns the current status of an export job.
      parameters:
      - description: Job ID (UUID)
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.statusResponse'
        "404":
          description: Not Found
      summary: Get export job status
      tags:
      - export subgraph
  /api/v1/export/jobs/{jobId}/download:
    get:
      description: Downloads the export artifact as a zip archive containing data.json.gz
        and schema.gz.
      parameters:
      - description: Job ID (UUID)
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/zip
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
      summary: Download export artifact
      tags:
      - export subgraph
  /api/v1/export/jobs/{jobId}/publish:
    post:
      description: Pushes a completed export job's artifact to the configured OCI
        registry as a signed artifact. Returns 503 if OCI publishing is not configured,
        422 if the job is not completed or its artifact file is missing.
      parameters:
      - description: Export job ID
        in: path
        name: jobId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.publishResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Publish export as OCI artifact
      tags:
      - oci
  /api/v1/inventory:
    get:
      description: Returns every node implementing ConfigItem, across all namespaces.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List all config items
      tags:
      - graph
  /api/v1/oci/artifacts:
    get:
      description: Returns the 100 most recent OCI artifacts ordered by publish time
        descending.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.artifactResponse'
            type: array
      summary: List OCI artifacts
      tags:
      - oci
  /api/v1/oci/artifacts/{id}:
    get:
      description: Returns a single OCI artifact record by ID.
      parameters:
      - description: Artifact ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.artifactResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get OCI artifact
      tags:
      - oci
  /api/v1/oci/public-key:
    get:
      description: Returns the PEM-encoded public key corresponding to the configured
        OCI signing key. Used by edge consumers to verify artifact signatures.
      produces:
      - application/x-pem-file
      responses:
        "200":
          description: OK
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get OCI signing public key
      tags:
      - oci
  /api/v1/oci/test-connection:
    post:
      description: 'Pings the configured OCI registry to verify credentials and reachability.
        Returns {"ok": true} on success or {"ok": false, "error": "..."} on failure.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Test OCI registry connection
      tags:
      - oci
  /api/v1/restore:
    get:
      description: Returns up to 50 restore jobs ordered by most recent first.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.restoreJobResponse'
            type: array
      summary: List restore jobs
      tags:
      - backup graph
    post:
      consumes:
      - application/json
      description: Restores DGraph blue from a stored backup. Blocked if any backup,
        export, or restore job is in progress.
      parameters:
      - description: backupId (UUID)
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/handler.triggerResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger a DGraph restore
      tags:
      - backup graph
  /api/v1/restore/{id}:
    get:
      description: Returns the status of a specific restore job.
      parameters:
      - description: Restore job ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.restoreJobResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get restore job status
      tags:
      - backup graph
  /divergence/publish:
    post:
      description: Sends a divergence report containing local overrides to orbital's
        report intake API. Returns 502 if orbital is unreachable.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Publish divergence report
      tags:
      - divergence
  /graphql:
    post:
      consumes:
      - application/json
      description: 'POST: proxies GraphQL queries and mutations to DGraph. GET: serves
        the GraphiQL explorer UI.'
      parameters:
      - description: GraphQL request body
        example: '"{\"query\": \"{ queryDataCenter { id name } }\"}"'
        in: body
        name: body
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: GraphQL endpoint
      tags:
      - graphql
  /import:
    post:
      consumes:
      - application/json
      description: Starts an async OCI artifact pull and DGraph import for the requested
        tag. Returns 409 if an import is already running.
      parameters:
      - description: Import request
        in: body
        name: body
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger import
      tags:
      - import
  /import/history:
    get:
      description: Returns the rolling history of completed and failed imports from
        disk.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/orb.ImportRecord'
            type: array
      summary: Import history
      tags:
      - import
  /import/status:
    get:
      description: Returns the current import state snapshot including status, current
        version, and last import record.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/orbserver.importSnapshot'
      summary: Import status
      tags:
      - import
  /import/tags:
    get:
      description: Lists available OCI artifact tags from the configured registry
        for this data center.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                type: string
              type: array
            type: object
      summary: List import tags
      tags:
      - import
  /overrides:
    get:
      description: Returns all current local field overrides from overrides.json.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/orb.Override'
            type: array
      summary: List overrides
      tags:
      - overrides
    post:
      consumes:
      - application/json
      description: Records a local field override for a Server or DataCenter resource.
        Writes the local value to DGraph and persists to overrides.json.
      parameters:
      - description: Override request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/orbserver.overrideRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Record local override
      tags:
      - overrides
swagger: "2.0"
tags:
- name: backup graph
- name: export subgraph
- name: events
- name: oci
