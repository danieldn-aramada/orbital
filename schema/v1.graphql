# Orbital DGraph Schema - v1
#
# Rules:
#   - Schema changes must be backwards compatible. Orbs may be on older versions.
#   - New types and nullable fields are safe. Removing or renaming fields is not.
#   - Schema is managed by orbital and applied via the DGraph admin API on startup.
#   - Do not apply this manually — orbital tracks the active version in PostgreSQL.
#
# DGraph directives used:
#   @search     — enables filtering/querying on a field
#   @hasInverse — declares the reverse edge of a relationship
#   @id         — marks a field as a unique identifier (like a unique index)

# DataCenter represents a modular data center location.
type DataCenter {
  id: ID!
  name: String! @id @search(by: [exact, term])
  description: String
  configurationItems: [ConfigurationItem] @hasInverse(field: dataCenter)
}

# ConfigurationItem (CI) is the universal node for anything managed in the CMDB —
# from physical hardware (racks, servers, switches, screws) to logical constructs
# (VLANs, IPs, Kubernetes clusters, app configs).
type ConfigurationItem {
  id: ID!
  name: String! @search(by: [exact, term])
  ciType: String! @search(by: [exact])
  dataCenter: DataCenter
  parent: ConfigurationItem
  children: [ConfigurationItem] @hasInverse(field: parent)
}
