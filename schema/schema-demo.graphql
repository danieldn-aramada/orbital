########################
# Top Level
########################
type Namespace {
    id: ID!
    name: String! @id @search(by: [term])
    createdBy: String
    createdAt: DateTime
}

type User {
    id: ID!
    email: String! @id @search(by: [hash])
}

########################
# Interfaces
#
# types implementing this interface should consider UPSERT support with the @id
# directive
########################
interface ConfigItem {
    id: ID!
    namespace: Namespace!
    orbId: String! @id @search(by: [hash]) # unique key for upsert
    name: String @search(by: [term])
    createdBy: String @search(by: [hash])
    createdAt: DateTime @search
    updatedBy: String @search(by: [hash])
    updatedAt: DateTime @search
    version: Float
}

########################
# Config Items
########################
type DataCenter implements ConfigItem {
    assetDataV2: String # json

    servers: [Server] @hasInverse(field: dataCenter)
    racks: [Rack] @hasInverse(field: dataCenter)
    kubernetesClusters: [KubernetesCluster] @hasInverse(field: dataCenter)
}

type Rack implements ConfigItem {
    dataCenter: DataCenter!
    servers: [Server] @hasInverse(field: rack)
}

type Server implements ConfigItem {
    hostname: String @search(by: [term])
    model: String @search(by: [term])
    manufacturer: String @search(by: [hash]) 
    serviceTag: String @search(by: [hash])
    rackPosition: Int
    oobMAC: String

    dataCenter: DataCenter!
    rack: Rack
    idracSettings: IdracSettings @hasInverse(field: server)
    serverConfigurationProfile: ServerConfigurationProfile @hasInverse(field: server)
    storageControllers: [StorageController] @hasInverse(field: server)

    oobIP: IPAddress @hasInverse(field: serverOobIP)
}


type IdracSettings implements ConfigItem {
    firmwareVersion: String
    osToIdracPassThroughEnabled: Boolean
    sshEnabled: Boolean
    usbManagementPortEnabled: Boolean

    server: Server!
}

type ServerConfigurationProfile implements ConfigItem {
    json: String 

    server: Server!
}

type StorageController implements ConfigItem {

    server: Server!
    storageDevices: [StorageDevice] @hasInverse(field: storageController)
}

type StorageDevice implements ConfigItem {
    capacityBytes: Int
    manufacturer: String
    model: String
    serialNumber: String
    wwn: String

    storageController: StorageController!
    storageVolumes: [StorageVolume] @hasInverse(field: storageDevices)
}

type StorageVolume implements ConfigItem {
    capacityBytes: Int
    manufacturer: String
    model: String
    serialNumber: String
    wwn: String

    storageController: StorageController!
    storageDevices: [StorageDevice] @hasInverse(field: storageVolumes)
}

type KubernetesCluster implements ConfigItem {
    provider: String # eksa

    dataCenter: DataCenter!
    eksaConfig: EksaConfig @hasInverse(field: kubernetesCluster)
}

type EksaConfig implements ConfigItem {
    clusterType: String # management, workload

    kubernetesCluster: KubernetesCluster!

    tinkerbellIP: IPAddress 
    controlPlaneIP: IPAddress
}


type IPAddress implements ConfigItem {
    type: String # ipv4, ipv6
    address: String! @search(by: [hash])
    role: String @search(by: [term]) # oob, tinkerbell, k8s_api, k8s_node

    serverOobIP: Server
    eksaConfigTinkerbellIP: EksaConfig
    eksaControlPlaneIP: EksaConfig 
}
