services:
  # Blue cluster — live graph store (test)
  dgraph-zero:
    image: dgraph/dgraph:v25.3.1
    command: dgraph zero --my=dgraph-zero:5080
    ports:
      - "15080:5080"
      - "16080:6080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080/state"]
      interval: 5s
      timeout: 5s
      retries: 10

  dgraph-alpha:
    image: dgraph/dgraph:v25.3.1
    command: >
      dgraph alpha
      --my=dgraph-alpha:7080
      --zero=dgraph-zero:5080
      --graphql extensions=false
      --security whitelist=0.0.0.0/0
    ports:
      - "17080:7080"
      - "18080:8080"
      - "19080:9080"
    volumes:
      - /tmp/orbital-test-blue:/dgraph/export
    depends_on:
      dgraph-zero:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  # Scratch cluster — isolated, used only for subgraph export tests
  dgraph-zero-scratch:
    image: dgraph/dgraph:v25.3.1
    command: dgraph zero --my=dgraph-zero-scratch:5080
    ports:
      - "16081:6080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6080/state"]
      interval: 5s
      timeout: 5s
      retries: 10

  dgraph-alpha-scratch:
    image: dgraph/dgraph:v25.3.1
    command: >
      dgraph alpha
      --my=dgraph-alpha-scratch:7080
      --zero=dgraph-zero-scratch:5080
      --graphql extensions=false
      --security whitelist=0.0.0.0/0
    ports:
      - "17081:7080"
      - "18081:8080"
      - "19081:9080"
    volumes:
      - /tmp/orbital-test-scratch:/dgraph/export
    depends_on:
      dgraph-zero-scratch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: orbital
      POSTGRES_PASSWORD: orbital
      POSTGRES_DB: orbital_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "orbital", "-d", "orbital_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  oci-registry:
    image: ghcr.io/project-zot/zot-linux-amd64:latest
    platform: linux/amd64
    command: serve /etc/zot/config.json
    ports:
      - "5001:5000"
    volumes:
      - ./zot-config.json:/etc/zot/config.json
    healthcheck:
      test: ["CMD", "/usr/local/bin/zot-linux-amd64", "verify", "/etc/zot/config.json"]
      interval: 5s
      timeout: 5s
      retries: 10
