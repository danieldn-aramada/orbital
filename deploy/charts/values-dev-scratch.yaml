zero:
  replicaCount: 1
  persistence:
    size: 8Gi
alpha:
  replicaCount: 1
  persistence:
    size: 10Gi
  extraFlags: "--graphql extensions=false"
ratel:
  enabled: false
backups:
  # full.enabled must be true for backups.volume to mount on the alpha pod (chart gates the volumeMount on $backupsEnabled).
  # Schedule set to Feb 30 (never fires) so no actual backup jobs run.
  full:
    enabled: true
    schedule: "0 0 30 2 *"
  volume:
    enabled: true
    mountPath: /dgraph/export
    claim: orbital-scratch-exports
serviceAccount:
  create: false
  name: dgraph
